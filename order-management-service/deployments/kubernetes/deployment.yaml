apiVersion: apps/v1
kind: Deployment
metadata:
  name: oms-app
  namespace: oms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oms-app
  template:
    metadata:
      labels:
        app: oms-app
    spec:
      containers:
        - name: oms
          image: rangga05/order-management-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: oms-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: oms-service
  namespace: oms
spec:
  type: NodePort
  selector:
    app: oms-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080