apiVersion: apps/v1
kind: Deployment
metadata:
  name: oms-postgres
  namespace: oms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oms-postgres
  template:
    metadata:
      labels:
        app: oms-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "oms_db"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: oms-postgres
  namespace: oms
spec:
  selector:
    app: oms-postgres
  ports:
    - port: 5432
      targetPort: 5432