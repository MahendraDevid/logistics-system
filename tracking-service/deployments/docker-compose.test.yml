# deployments/docker-compose.test.yml
# HANYA untuk keperluan functional test, bukan production.
# Dijalankan oleh Jenkins CI/CD pipeline sebelum functional test.
#
# Penggunaan:
#   docker-compose -f deployments/docker-compose.test.yml up -d
#   go test -v -tags=functional ./tests/functional/...
#   docker-compose -f deployments/docker-compose.test.yml down -v

version: "3.8"

services:

  # MongoDB untuk menyimpan riwayat event tracking
  mongodb-test:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpass
      MONGO_INITDB_DATABASE: tracking_test
    ports:
      - "27018:27017"  # Port berbeda agar tidak bentrok dengan MongoDB development
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Redis untuk menyimpan status terakhir paket
  redis-test:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"  # Port berbeda agar tidak bentrok dengan Redis development
    command: redis-server --save "" --appendonly no  # Non-persistent untuk test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
