apiVersion: v1
kind: Service
metadata:
  name: tracking-service
  labels:
    app: tracking-service
spec:
  # ClusterIP — hanya accessible dari dalam cluster
  # API Gateway yang akan expose ke publik
  type: ClusterIP
  selector:
    app: tracking-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
