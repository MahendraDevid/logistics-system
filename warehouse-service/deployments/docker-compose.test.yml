# deployments/docker-compose.test.yml
# HANYA untuk keperluan functional test, bukan production

version: "3.8"
services:
  
  # Database PostgreSQL untuk test
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: wms_test
    ports:
      - "5433:5432"  # Port berbeda agar tidak bentrok dengan DB development
    # Healthcheck agar kita tahu kapan DB benar-benar siap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d wms_test"]
      interval: 5s
      timeout: 5s
      retries: 5