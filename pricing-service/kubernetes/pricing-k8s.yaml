# ==========================================
# CONFIGMAP & SECRET: Pricing Service
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: pricing-config
data:
  db_host: "postgres-service:5432"
  redis_host: "redis-service:6379"
  app_port: "8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: pricing-secret
type: Opaque
data:
  # echo -n "password123" | base64
  db_password: cGFzc3dvcmQxMjM=
  db_user: cHJpY2luZ3VzZXI=

---
# ==========================================
# DEPLOYMENT: Pricing Service
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service
  labels:
    app: pricing-service
    version: "1.0"
spec:
  replicas: 3  # Minimal 3 replica untuk handle 2.000 - 4.000 RPS
  selector:
    matchLabels:
      app: pricing-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pricing-service
    spec:
      containers:
        - name: pricing-service
          image: arpusauri/pricing-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: pricing-config
                  key: db_host
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: pricing-config
                  key: redis_host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pricing-secret
                  key: db_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pricing-secret
                  key: db_password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"  # Max 1 Core penuh saat peak RPS
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

---
# ==========================================
# SERVICE: Pricing Service
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
spec:
  selector:
    app: pricing-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP