apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: pricing-service

  template:
    metadata:
      labels:
        app: pricing-service

    spec:
      containers:
        - name: pricing-service
          image: arpusauri/pricing-service:latest

          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service

spec:
  selector:
    app: pricing-service

  ports:
    - port: 80
      targetPort: 8080

  type: ClusterIP